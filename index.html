<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Skin Care Atelier</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a; --secondary: #8d7b6d; --accent: #fdfaf8;
            --white: #ffffff; --border: #eeeeee; --text: #2d2d2d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--accent); color: var(--text); }

        #app { max-width: 500px; margin: 0 auto; background: var(--white); min-height: 100vh; display: none; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.02); }
        header { padding: 1.5rem; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.03); position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 0.5rem; text-transform: uppercase; font-weight: 300; cursor: pointer; }
        
        main { flex: 1; padding: 2rem 1.5rem; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 1.5rem; text-align: center; font-style: italic; }

        .btn { display: block; width: 100%; padding: 1.1rem; background: var(--primary); color: white; border: none; text-transform: uppercase; letter-spacing: 0.2rem; font-size: 0.65rem; cursor: pointer; margin-top: 1rem; }
        .btn-back { background: none; color: var(--text); border: none; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-bottom: 1.5rem; display: block; width: fit-content; }
        .btn-ghost { background: none; border: 1px solid var(--border); color: var(--primary); }

        .product-card { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .tracker-card { background: var(--accent); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        
        .status-tracker { display: flex; justify-content: space-between; margin-top: 20px; position: relative; }
        .status-tracker::after { content: ''; position: absolute; top: 10px; left: 0; right: 0; height: 1px; background: #ddd; z-index: 1; }
        .dot { width: 20px; height: 20px; background: #fff; border: 1px solid #ddd; border-radius: 50%; z-index: 2; position: relative; }
        .dot.active { background: var(--secondary); border-color: var(--secondary); }
        .dot-label { font-size: 0.5rem; color: #aaa; margin-top: 8px; text-align: center; }
        .dot-label.active { color: var(--secondary); font-weight: bold; }

        .star-rating { font-size: 1.8rem; cursor: pointer; color: #eee; margin: 0 5px; }
        .star-rating.active { color: var(--secondary); }

        input, textarea { width: 100%; padding: 1rem; border: none; border-bottom: 1px solid var(--border); margin-bottom: 1rem; outline: none; background: transparent; font-family: inherit; }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--accent); text-align:center;">
        <h1 style="font-family:'Cormorant Garamond'; font-size:2.5rem; letter-spacing:10px; font-weight:300;">LUMINA</h1>
        <button class="btn" style="width:220px; margin-top:2rem;" onclick="initApp()">Entrar al Atelier</button>
        <button class="btn btn-ghost" style="width:220px; margin-top:1rem;" onclick="showTrackingSearch()">Rastrear Pedido</button>
    </div>

    <div id="app">
        <header><div class="brand" onclick="location.reload()">Lumina</div></header>
        <main id="stage"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.app = {
            state: { step: 'intro', cart: [], dbProducts: [], skinType: null, rating: 0, orderID: null, lastDocID: null, trackedOrder: null },

            init() {
                onSnapshot(collection(db, "productos"), (snap) => {
                    this.state.dbProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.render();
                });
            },

            setStep(s) { 
                this.state.step = s; 
                this.render(); 
            },

            goBack() {
                const current = this.state.step;
                if(current === 'diagnostic' || current === 'catalog' || current === 'tracking_view') {
                    this.state.skinType = null;
                    this.setStep('intro');
                } else if(current === 'checkout') {
                    this.setStep('catalog');
                } else if(current === 'feedback') {
                    this.setStep('order_success');
                } else {
                    location.reload();
                }
            },

            render() {
                const stage = document.getElementById('stage');
                stage.innerHTML = '';

                // Renderizado del botón volver (corregido)
                if(!['intro', 'order_success'].includes(this.state.step)) {
                    stage.innerHTML = `<button class="btn-back" onclick="app.goBack()">← VOLVER</button>`;
                }

                if(this.state.step === 'intro') {
                    stage.innerHTML += `
                        <div style="text-align:center; padding-top:10vh;">
                            <h2>Bienvenido</h2>
                            <button class="btn" onclick="app.setStep('diagnostic')">Asesoría Personalizada</button>
                            <button class="btn btn-ghost" onclick="app.setStep('catalog')">Ver Catálogo Completo</button>
                        </div>`;
                }
                else if(this.state.step === 'diagnostic') {
                    stage.innerHTML += `
                        <h2>Tipo de Piel</h2>
                        <div onclick="app.state.skinType='seca'; app.setStep('catalog')" class="btn-ghost" style="padding:1.5rem; text-align:center; margin-bottom:1rem; cursor:pointer;">Seca / Opaca</div>
                        <div onclick="app.state.skinType='grasa'; app.setStep('catalog')" class="btn-ghost" style="padding:1.5rem; text-align:center; margin-bottom:1rem; cursor:pointer;">Grasa / Poros</div>
                        <div onclick="app.state.skinType='mixta'; app.setStep('catalog')" class="btn-ghost" style="padding:1.5rem; text-align:center; margin-bottom:1rem; cursor:pointer;">Mixta</div>`;
                }
                else if(this.state.step === 'catalog') {
                    stage.innerHTML += `<h2>Catálogo</h2>`;
                    this.state.dbProducts.forEach(p => {
                        const isRecom = this.state.skinType && p.description?.toLowerCase().includes(this.state.skinType);
                        stage.innerHTML += `
                            <div class="product-card">
                                ${isRecom ? '<span style="font-size:0.55rem; color:var(--secondary); letter-spacing:1px; font-weight:bold;">✦ RECOMENDADO</span>' : ''}
                                <div style="display:flex; justify-content:space-between; margin:0.5rem 0;">
                                    <strong>${p.name}</strong><span>Q${p.price}</span>
                                </div>
                                <button class="btn" style="padding:0.6rem; font-size:0.5rem;" onclick="addToCart('${p.id}')">Añadir</button>
                            </div>`;
                    });
                    if(this.state.cart.length > 0) {
                        stage.innerHTML += `<button class="btn" onclick="app.setStep('checkout')" style="background:var(--secondary);">PAGAR (${this.state.cart.length})</button>`;
                    }
                }
                else if(this.state.step === 'checkout') {
                    stage.innerHTML += `<h2>Envío</h2>
                        <input type="text" id="c_name" placeholder="Nombre">
                        <input type="text" id="c_addr" placeholder="Dirección">
                        <button class="btn" onclick="processOrder()">Confirmar</button>`;
                }
                else if(this.state.step === 'order_success') {
                    stage.innerHTML = `
                        <div style="text-align:center; padding-top:5vh;">
                            <h2 style="font-size:2.5rem;">✦</h2>
                            <h2>Confirmado</h2>
                            <p style="font-size:0.8rem; margin:1rem 0;">Código de seguimiento:</p>
                            <div style="background:var(--accent); padding:1rem; font-weight:bold; letter-spacing:3px; font-size:1.2rem; border:1px dashed var(--secondary);">${this.state.orderID}</div>
                            <button class="btn" onclick="app.setStep('feedback')">Dejar Comentario</button>
                            <button class="btn btn-ghost" onclick="location.reload()" style="margin-top:1rem;">Volver al Inicio</button>
                        </div>`;
                }
                else if(this.state.step === 'feedback') {
                    stage.innerHTML += `
                        <h2>Sugerencias</h2>
                        <div style="text-align:center; margin-bottom:2rem;">
                            ${[1,2,3,4,5].map(n => `<span class="star-rating" onclick="setStar(${n})">★</span>`).join('')}
                        </div>
                        <textarea id="f_msg" placeholder="¿Cómo podemos mejorar?"></textarea>
                        <button class="btn" onclick="sendFeedback()">Enviar</button>`;
                }
                else if(this.state.step === 'tracking_view') {
                    const o = this.state.trackedOrder;
                    const status = o.status || 'pendiente';
                    const cur = {pendiente: 1, proceso: 2, enviado: 3, entregado: 4}[status];
                    stage.innerHTML += `
                        <h2>Mi Pedido</h2>
                        <div class="tracker-card">
                            <p style="font-size:0.7rem; color:gray; text-align:center;">ID: ${o.trackingID}</p>
                            <div class="status-tracker">
                                <div style="display:flex; flex-direction:column; align-items:center;"><div class="dot ${cur>=1?'active':''}"></div><span class="dot-label ${cur>=1?'active':''}">Recibido</span></div>
                                <div style="display:flex; flex-direction:column; align-items:center;"><div class="dot ${cur>=2?'active':''}"></div><span class="dot-label ${cur>=2?'active':''}">Proceso</span></div>
                                <div style="display:flex; flex-direction:column; align-items:center;"><div class="dot ${cur>=3?'active':''}"></div><span class="dot-label ${cur>=3?'active':''}">Enviado</span></div>
                                <div style="display:flex; flex-direction:column; align-items:center;"><div class="dot ${cur>=4?'active':''}"></div><span class="dot-label ${cur>=4?'active':''}">Entregado</span></div>
                            </div>
                        </div>
                        <p style="text-align:center; margin-top:2rem; font-size:0.85rem;">Estado: <strong>${status.toUpperCase()}</strong></p>`;
                }
            }
        };

        window.initApp = () => { 
            document.getElementById('login-screen').style.display='none'; 
            document.getElementById('app').style.display='flex'; 
            app.init(); 
        };

        window.addToCart = (id) => { 
            app.state.cart.push(app.state.dbProducts.find(x => x.id === id)); 
            app.render(); 
        };

        window.setStar = (n) => { 
            app.state.rating = n; 
            document.querySelectorAll('.star-rating').forEach((s, i) => s.classList.toggle('active', i < n)); 
        };

        window.processOrder = async () => {
            const name = document.getElementById('c_name').value;
            const addr = document.getElementById('c_addr').value;
            if(!name || !addr) return alert("Completa tus datos");
            const trackingID = 'LUM-' + Math.floor(1000 + Math.random() * 9000);
            const res = await addDoc(collection(db, "pedidos"), {
                name, addr, trackingID, items: app.state.cart, total: app.state.cart.reduce((s,p)=>s+p.price,0),
                status: 'pendiente', rating: 0, feedback: '', createdAt: new Date()
            });
            app.state.lastDocID = res.id; app.state.orderID = trackingID; app.state.cart = []; app.setStep('order_success');
        };

        window.sendFeedback = async () => {
            const msg = document.getElementById('f_msg').value;
            await updateDoc(doc(db, "pedidos", app.state.lastDocID), { rating: app.state.rating, feedback: msg });
            alert("Enviado con éxito"); location.reload();
        };

        window.showTrackingSearch = async () => {
            const code = prompt("Código:");
            if(!code) return;
            const q = query(collection(db, "pedidos"), where("trackingID", "==", code.toUpperCase()));
            const snap = await getDocs(q);
            if(snap.empty) return alert("No existe");
            app.state.trackedOrder = snap.docs[0].data();
            document.getElementById('login-screen').style.display='none'; 
            document.getElementById('app').style.display='flex'; 
            app.setStep('tracking_view');
        };
    </script>
</body>
</html>
