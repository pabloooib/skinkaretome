<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Sistema de Gestión Skincare</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #8d7b6d;
            --accent: #f4ece6;
            --success: #4a7c59;
            --bg: #ffffff;
            --text: #333333;
            --text-muted: #757575;
            --border: #eeeeee;
            --radius: 4px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f9f9f9;
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* App Shell */
        #app {
            max-width: 450px;
            margin: 0 auto;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        #app.admin-mode { max-width: 900px; background: #fdfdfd; }

        header {
            padding: 1.2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 0.9rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            font-weight: 300;
        }

        .mode-switcher {
            font-size: 0.6rem;
            margin-top: 5px;
            color: var(--secondary);
            cursor: pointer;
            text-decoration: underline;
        }

        main { flex: 1; padding: 1.5rem; position: relative; }

        /* Componentes de UI */
        .view-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 1.25rem; font-weight: 400; margin-bottom: 1rem; color: var(--primary); }
        .price-tag { color: var(--secondary); font-weight: 500; }

        .btn {
            display: block; width: 100%; padding: 1rem;
            background: var(--primary); color: white; border: none;
            text-transform: uppercase; letter-spacing: 0.1rem; font-size: 0.75rem;
            cursor: pointer; transition: var(--transition); border-radius: var(--radius);
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--primary); }

        /* Catálogo Visual */
        .product-card {
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            border-radius: var(--radius);
            overflow: hidden;
        }
        .product-img {
            width: 100%; height: 200px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
        }
        .product-info { padding: 1rem; }
        .product-desc { font-size: 0.85rem; color: var(--text-muted); margin: 0.5rem 0; }
        .product-benefit { font-size: 0.75rem; color: var(--secondary); margin-bottom: 1rem; }

        /* Floating Cart */
        .cart-bar {
            position: sticky; bottom: 0; background: var(--primary);
            color: white; padding: 1rem 1.5rem; display: flex;
            justify-content: space-between; align-items: center;
            font-size: 0.9rem; z-index: 90;
        }

        /* Admin Dashboard */
        .order-card {
            background: white; border: 1px solid var(--border);
            padding: 1rem; margin-bottom: 1rem; border-radius: 8px;
        }
        .status-badge {
            font-size: 0.65rem; padding: 2px 8px;
            background: var(--accent); border-radius: 10px;
        }

        /* Forms */
        input, select, textarea {
            width: 100%; padding: 0.8rem; margin-bottom: 1rem;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-family: inherit;
        }

        .rating-stars { display: flex; gap: 10px; margin: 1rem 0; justify-content: center; }
        .star { cursor: pointer; font-size: 1.5rem; color: #ddd; }
        .star.active { color: #d4af37; }

    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="brand">Lumina Atelier</div>
            <div class="mode-switcher" onclick="toggleMode()">Cambiar a Vista Vendedor</div>
        </header>

        <main id="stage">
            </main>

        <div id="global-cart-bar" class="cart-bar" style="display:none" onclick="app.setState({step: 'cart'})">
            <span>Ver mi carrito</span>
            <span id="cart-total-display">Q 0.00</span>
        </div>
    </div>

    <script>
        /**
         * ARQUITECTURA DE DATOS
         */
        const CATALOG = [
            { id: 1, name: "Sérum Resplandor", price: 250, icon: "✨", info: "Vitamina C + Ácido Hialurónico", benefit: "Aporta luminosidad y reduce manchas.", skin: "seca" },
            { id: 2, name: "Gel Equilibrante", price: 185, icon: "🍃", info: "Niacinamida 5% + Zinc", benefit: "Controla el brillo y minimiza poros.", skin: "grasa" },
            { id: 3, name: "Bálsamo Nube", price: 210, icon: "☁️", info: "Ceramidas + Escualano", benefit: "Repara la barrera cutánea.", skin: "mixta" }
        ];

        /**
         * COMUNICACIÓN EN TIEMPO REAL (Sync Engine)
         */
        const channel = new BroadcastChannel('skincare_sync');

        /**
         * ESTADO GLOBAL
         */
        const app = {
            state: {
                isAdmin: false,
                step: 'intro', // intro, diagnostic, catalog, cart, checkout, success, feedback
                skinType: null,
                cart: [],
                customer: { address: '', payment: 'Transferencia' },
                orders: JSON.parse(localStorage.getItem('lumina_orders') || '[]'),
                feedback: null
            },

            setState(update) {
                this.state = { ...this.state, ...update };
                this.sync();
                this.render();
            },

            sync() {
                // Persistir órdenes localmente
                localStorage.setItem('lumina_orders', JSON.stringify(this.state.orders));
                // Notificar a otras pestañas
                channel.postMessage({ type: 'UPDATE_STATE', data: this.state });
            },

            render() {
                const stage = document.getElementById('stage');
                const cartBar = document.getElementById('global-cart-bar');
                const appContainer = document.getElementById('app');

                // Toggle Admin Mode Class
                appContainer.classList.toggle('admin-mode', this.state.isAdmin);
                document.querySelector('.mode-switcher').innerText = this.state.isAdmin ? "Volver a Vista Cliente" : "Ir a Vista Vendedor";

                if (this.state.isAdmin) {
                    cartBar.style.display = 'none';
                    return renderAdmin(stage);
                }

                // Renderizado por pasos (Cliente)
                switch(this.state.step) {
                    case 'intro': renderIntro(stage); break;
                    case 'diagnostic': renderDiagnostic(stage); break;
                    case 'catalog': renderCatalog(stage); break;
                    case 'cart': renderCart(stage); break;
                    case 'checkout': renderCheckout(stage); break;
                    case 'success': renderSuccess(stage); break;
                    case 'feedback': renderFeedback(stage); break;
                }

                // Control barra de carrito
                const total = this.state.cart.reduce((s, item) => s + item.price, 0);
                if (this.state.cart.length > 0 && ['catalog', 'diagnostic'].includes(this.state.step)) {
                    cartBar.style.display = 'flex';
                    document.getElementById('cart-total-display').innerText = `Q ${total.toFixed(2)}`;
                } else {
                    cartBar.style.display = 'none';
                }
            }
        };

        // Escuchar cambios de otras pestañas
        channel.onmessage = (event) => {
            if (event.data.type === 'UPDATE_STATE') {
                app.state.orders = event.data.data.orders;
                app.render();
            }
        };

        /**
         * VISTAS: CLIENTE
         */

        function renderIntro(el) {
            el.innerHTML = `
                <div class="view-fade" style="text-align:center; padding-top:2rem">
                    <h2 style="letter-spacing:0.2rem; text-transform:uppercase">Tu piel, tu arte</h2>
                    <p style="margin-bottom:2rem">Descubre una rutina diseñada por expertos para la arquitectura de tu rostro.</p>
                    <button class="btn" onclick="app.setState({step: 'diagnostic'})">Comenzar Diagnóstico</button>
                </div>
            `;
        }

        function renderDiagnostic(el) {
            el.innerHTML = `
                <div class="view-fade">
                    <h2>Diagnóstico Express</h2>
                    <p>¿Cómo sientes tu piel al mediodía?</p>
                    <button class="btn btn-outline" style="margin-bottom:0.5rem" onclick="app.setState({skinType:'seca', step:'catalog'})">Tirante o con zonas opacas</button>
                    <button class="btn btn-outline" style="margin-bottom:0.5rem" onclick="app.setState({skinType:'grasa', step:'catalog'})">Brillante en todo el rostro</button>
                    <button class="btn btn-outline" onclick="app.setState({skinType:'mixta', step:'catalog'})">Brillo en frente y nariz, mejillas secas</button>
                </div>
            `;
        }

        function renderCatalog(el) {
            let html = `<div class="view-fade"><h2>Recomendación</h2>`;
            const items = app.state.skinType ? CATALOG.filter(i => i.skin === app.state.skinType || i.skin === 'todas') : CATALOG;
            
            items.forEach(p => {
                const inCart = app.state.cart.find(c => c.id === p.id);
                html += `
                    <div class="product-card">
                        <div class="product-img">${p.icon}</div>
                        <div class="product-info">
                            <div style="display:flex; justify-content:space-between">
                                <strong>${p.name}</strong>
                                <span class="price-tag">Q ${p.price}</span>
                            </div>
                            <p class="product-desc">${p.info}</p>
                            <p class="product-benefit"><strong>Beneficio:</strong> ${p.benefit}</p>
                            <button class="btn ${inCart ? 'btn-outline' : ''}" onclick="toggleCart(${p.id})">
                                ${inCart ? 'Quitar del carrito' : 'Añadir al carrito'}
                            </button>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            el.innerHTML = html;
        }

        function renderCart(el) {
            const total = app.state.cart.reduce((s, i) => s + i.price, 0);
            let html = `<div class="view-fade"><h2>Tu Carrito</h2>`;
            app.state.cart.forEach(item => {
                html += `<div style="display:flex; justify-content:space-between; padding:1rem 0; border-bottom:1px solid #eee">
                    <span>${item.name}</span><strong>Q ${item.price}</strong>
                </div>`;
            });
            html += `
                <div style="padding:1.5rem 0; text-align:right"><h3>Total: Q ${total.toFixed(2)}</h3></div>
                <button class="btn" onclick="app.setState({step:'checkout'})">Continuar al Pago</button>
                <button class="btn btn-outline" style="margin-top:1rem" onclick="app.setState({step:'catalog'})">Seguir comprando</button>
            </div>`;
            el.innerHTML = html;
        }

        function renderCheckout(el) {
            el.innerHTML = `
                <div class="view-fade">
                    <h2>Finalizar Pedido</h2>
                    <label>Dirección completa</label>
                    <input type="text" id="addr" placeholder="Ej: 10 calle 5-50 zona 10, Edificio..." onchange="app.state.customer.address = this.value">
                    <label>Método de Pago</label>
                    <select onchange="app.state.customer.payment = this.value">
                        <option>Transferencia</option>
                        <option>Efectivo contra entrega</option>
                        <option>Tarjeta (Próximamente)</option>
                    </select>
                    <div style="background:var(--accent); padding:1rem; border-radius:var(--radius); font-size:0.8rem; margin-bottom:1.5rem">
                        ℹ️ El costo de envío depende de la zona y será definido por el asesor que te atiende.
                    </div>
                    <button class="btn" onclick="enviarPedido()">Confirmar y Enviar</button>
                </div>
            `;
        }

        function renderSuccess(el) {
            el.innerHTML = `
                <div class="view-fade" style="text-align:center; padding-top:3rem">
                    <div style="font-size:4rem">✅</div>
                    <h2>¡Pedido Enviado!</h2>
                    <p>Un asesor recibirá tu pedido en segundos para coordinar el envío.</p>
                    <button class="btn btn-outline" style="margin-top:2rem" onclick="app.setState({step:'feedback'})">Calificar Experiencia</button>
                </div>
            `;
        }

        function renderFeedback(el) {
            el.innerHTML = `
                <div class="view-fade" style="text-align:center">
                    <h2>¿Cómo fue tu experiencia?</h2>
                    <div class="rating-stars">
                        ${[1,2,3,4,5].map(n => `<span class="star" onclick="setRating(${n})">★</span>`).join('')}
                    </div>
                    <textarea id="feedback-txt" placeholder="¿Qué podríamos mejorar?" style="height:100px"></textarea>
                    <button class="btn" onclick="enviarFeedback()">Enviar Comentarios</button>
                </div>
            `;
        }

        /**
         * VISTAS: VENDEDOR (DASHBOARD)
         */

        function renderAdmin(el) {
            let html = `<div class="view-fade">
                <h2 style="display:flex; justify-content:space-between">
                    Panel de Pedidos 
                    <span class="status-badge" style="background:var(--success); color:white">En Línea</span>
                </h2>`;
            
            if (app.state.orders.length === 0) {
                html += `<p style="padding:4rem; text-align:center; border:2px dashed #eee">Esperando nuevos pedidos...</p>`;
            } else {
                app.state.orders.slice().reverse().forEach(order => {
                    html += `
                        <div class="order-card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:1rem">
                                <strong>Pedido #${order.id}</strong>
                                <span class="status-badge">${order.status}</span>
                            </div>
                            <div style="font-size:0.9rem; margin-bottom:1rem">
                                <div>📍 <strong>Dirección:</strong> ${order.address}</div>
                                <div>💳 <strong>Pago:</strong> ${order.payment}</div>
                            </div>
                            <div style="border-top:1px solid #f5f5f5; padding-top:0.5rem">
                                ${order.items.map(i => `<div style="display:flex; justify-content:space-between; font-size:0.8rem"><span>${i.name}</span><span>Q${i.price}</span></div>`).join('')}
                            </div>
                            <div style="text-align:right; margin-top:0.5rem; font-weight:600">Subtotal: Q ${order.total}</div>
                            ${order.feedback ? `<div style="margin-top:1rem; padding:0.5rem; background:#fff9e6; border-radius:4px; font-size:0.8rem">
                                ⭐️ ${order.feedback.stars} Estrellas: "${order.feedback.comment}"
                            </div>` : ''}
                        </div>
                    `;
                });
            }
            html += `</div>`;
            el.innerHTML = html;
        }

        /**
         * LÓGICA DE NEGOCIO
         */

        window.toggleMode = () => app.setState({ isAdmin: !app.state.isAdmin });

        window.toggleCart = (id) => {
            const product = CATALOG.find(p => p.id === id);
            const inCart = app.state.cart.find(c => c.id === id);
            let newCart = [...app.state.cart];
            
            if (inCart) newCart = newCart.filter(c => c.id !== id);
            else newCart.push(product);
            
            app.setState({ cart: newCart });
        };

        window.enviarPedido = () => {
            if (!app.state.customer.address) return alert("Por favor ingresa tu dirección");
            
            const newOrder = {
                id: Date.now().toString().slice(-4),
                items: app.state.cart,
                total: app.state.cart.reduce((s, i) => s + i.price, 0),
                address: app.state.customer.address,
                payment: app.state.customer.payment,
                status: 'Pendiente',
                feedback: null
            };

            const updatedOrders = [...app.state.orders, newOrder];
            app.setState({ 
                orders: updatedOrders, 
                step: 'success',
                cart: [] // Limpiar carrito tras enviar
            });
        };

        window.setRating = (n) => {
            document.querySelectorAll('.star').forEach((s, idx) => {
                s.classList.toggle('active', idx < n);
            });
            app.state.tempRating = n;
        };

        window.enviarFeedback = () => {
            const comment = document.getElementById('feedback-txt').value;
            const stars = app.state.tempRating || 5;
            
            // Adjuntar al último pedido realizado
            const updatedOrders = [...app.state.orders];
            if (updatedOrders.length > 0) {
                updatedOrders[updatedOrders.length - 1].feedback = { stars, comment };
            }

            app.setState({ orders: updatedOrders, step: 'intro', feedback: {stars, comment} });
            alert("¡Gracias por tus comentarios!");
        };

        // Inicialización
        app.render();

    </script>
</body>
</html>
