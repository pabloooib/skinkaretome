<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Skin Care Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a; --secondary: #8d7b6d; --accent: #fdfaf8;
            --white: #ffffff; --border: #eeeeee; --text: #2d2d2d;
            --text-muted: #757575; --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--accent); color: var(--text); line-height: 1.7; }
        
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #fff 0%, #f4ece6 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: var(--transition); }
        .login-orb { width: 120px; height: 120px; background: var(--white); border-radius: 50% 50% 0 50%; transform: rotate(-45deg); box-shadow: 0 20px 40px rgba(141, 123, 109, 0.15); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.8); }
        .login-orb::after { content: "ENTRAR"; transform: rotate(45deg); font-size: 0.6rem; letter-spacing: 0.3rem; color: var(--secondary); }
        .login-brand { margin-top: 2.5rem; font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; letter-spacing: 0.5rem; text-transform: uppercase; font-weight: 300; }

        #app { max-width: 480px; margin: 0 auto; background: var(--white); min-height: 100vh; display: none; flex-direction: column; opacity: 0; transition: opacity 1s ease; }
        header { padding: 2rem 1.5rem; text-align: center; position: sticky; top: 0; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .brand-text { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; letter-spacing: 0.4rem; text-transform: uppercase; }
        main { flex: 1; padding: 2rem 1.8rem; }
        
        .product-card { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); animation: fadeInUp 0.8s ease forwards; }
        .product-info-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
        .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; }
        .product-price { color: var(--secondary); font-size: 0.9rem; }
        .product-detail { font-size: 0.8rem; font-weight: 200; color: var(--text-muted); margin-bottom: 1.2rem; }

        .btn { display: block; width: 100%; padding: 1.1rem; background: var(--primary); color: white; border: none; text-transform: uppercase; letter-spacing: 0.2rem; font-size: 0.65rem; cursor: pointer; transition: var(--transition); }
        .btn-back { background: none; border: none; color: var(--secondary); font-size: 0.6rem; letter-spacing: 0.15rem; text-transform: uppercase; cursor: pointer; margin-bottom: 1.5rem; }
        input, select, textarea { width: 100%; padding: 1rem; border: 1px solid var(--border); margin-bottom: 1.2rem; font-family: 'Inter', sans-serif; outline: none; }
        
        .cart-status { position: sticky; bottom: 0; background: var(--primary); color: white; padding: 1.5rem; display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 0.1rem; text-transform: uppercase; cursor: pointer; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-orb" onclick="initApp()"></div>
        <h1 class="login-brand">Lumina</h1>
        <p style="margin-top: 1rem; letter-spacing: 0.2rem; font-size: 0.6rem;">ATELIER DE PIEL</p>
    </div>

    <div id="app">
        <header><div class="brand-text">Lumina</div></header>
        <main id="stage"></main>
        <div id="cart-indicator" class="cart-status" style="display: none;" onclick="app.setStep('cart')">
            <span id="cart-count">0 ARTÍCULOS</span>
            <span id="cart-total">Q 0.00</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        // Estado Global
        window.app = {
            state: {
                step: 'intro',
                cart: [],
                dbProducts: [] // Aquí se guardará lo que venga de Firebase
            },

            init() {
                // Escuchar cambios en los productos del asesor
                onSnapshot(collection(db, "productos"), (snapshot) => {
                    this.state.dbProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.render(); // Re-renderizar si cambian los productos
                });
            },

            setStep(newStep) {
                this.state.step = newStep;
                this.render();
                window.scrollTo({top: 0, behavior: 'smooth'});
            },

            render() {
                const stage = document.getElementById('stage');
                const cartBar = document.getElementById('cart-indicator');
                const total = this.state.cart.reduce((s, p) => s + p.price, 0);

                cartBar.style.display = (this.state.cart.length > 0 && (this.state.step === 'catalog' || this.state.step === 'intro')) ? 'flex' : 'none';
                if(cartBar.style.display === 'flex') {
                    document.getElementById('cart-count').innerText = `${this.state.cart.length} ARTÍCULOS`;
                    document.getElementById('cart-total').innerText = `Q ${total.toFixed(2)}`;
                }

                stage.innerHTML = '';
                if(this.state.step === 'intro') {
                    stage.innerHTML = `
                        <div style="text-align: center; margin-top: 2rem;">
                            <h2 style="font-family:'Cormorant Garamond'; font-weight:300; font-size:1.8rem; margin-bottom:1rem;">Su ritual de belleza</h2>
                            <p style="font-weight:200; font-size:0.9rem; color:#757575; margin-bottom:2rem;">Explore nuestras fórmulas exclusivas preparadas para su piel.</p>
                            <button class="btn" onclick="app.setStep('catalog')">Ver Catálogo</button>
                        </div>`;
                } 
                else if(this.state.step === 'catalog') {
                    stage.innerHTML = `<button class="btn-back" onclick="app.setStep('intro')">← Inicio</button>
                                       <h2 style="font-family:'Cormorant Garamond'; font-weight:300; font-size:1.8rem; margin-bottom:2rem;">Fórmulas Disponibles</h2>`;
                    
                    if(this.state.dbProducts.length === 0) {
                        stage.innerHTML += `<p>No hay productos disponibles en este momento.</p>`;
                    }

                    this.state.dbProducts.forEach(p => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML = `
                            <div class="product-info-row">
                                <span class="product-name">${p.name}</span>
                                <span class="product-price">Q ${p.price.toFixed(2)}</span>
                            </div>
                            <p class="product-detail">${p.description || 'Sin descripción'}</p>
                            <button class="btn" onclick="addToCart('${p.id}')">Añadir a la bolsa</button>
                        `;
                        stage.appendChild(card);
                    });
                }
                else if(this.state.step === 'cart') {
                    stage.innerHTML = `<button class="btn-back" onclick="app.setStep('catalog')">← Regresar</button><h2>Su Bolsa</h2>`;
                    this.state.cart.forEach(p => {
                        stage.innerHTML += `<div style="display:flex; justify-content:space-between; padding:1.2rem 0; border-bottom:1px solid #f9f9f9;">
                            <span style="font-size:0.9rem">${p.name}</span><strong>Q ${p.price.toFixed(2)}</strong>
                        </div>`;
                    });
                    stage.innerHTML += `<div style="text-align:right; padding:2rem 0"><h3>Total: Q ${total.toFixed(2)}</h3></div>
                                         <button class="btn" onclick="app.setStep('checkout')">Finalizar Compra</button>`;
                }
                else if(this.state.step === 'checkout') {
                    stage.innerHTML = `
                        <button class="btn-back" onclick="app.setStep('cart')">← Regresar</button>
                        <h2>Entrega</h2>
                        <input type="text" id="c_name" placeholder="Nombre completo">
                        <input type="text" id="c_addr" placeholder="Dirección de vivienda">
                        <select id="c_pay">
                            <option value="Transferencia">Transferencia Bancaria</option>
                            <option value="Efectivo">Efectivo contra entrega</option>
                        </select>
                        <button class="btn" onclick="processOrder()">Confirmar Pedido</button>
                    `;
                }
                else if(this.state.step === 'success') {
                    stage.innerHTML = `<div style="text-align:center; padding-top:4rem;"><span style="font-size:4rem;">✦</span><h2>Pedido en Camino</h2><p>Un asesor le contactará en breve.</p></div>`;
                }
            }
        };

        window.initApp = () => {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                const appEl = document.getElementById('app');
                appEl.style.display = 'flex';
                setTimeout(() => appEl.style.opacity = '1', 50);
                app.init();
            }, 600);
        };

        window.addToCart = (id) => {
            const prod = app.state.dbProducts.find(p => p.id === id);
            app.state.cart.push(prod);
            app.render();
        };

        window.processOrder = async () => {
            const name = document.getElementById('c_name').value;
            const addr = document.getElementById('c_addr').value;
            if(!name || !addr) return alert("Complete los datos");

            await addDoc(collection(db, "pedidos"), {
                id: Math.floor(1000 + Math.random() * 9000),
                name, addr,
                items: app.state.cart,
                total: app.state.cart.reduce((s, p) => s + p.price, 0),
                payment: document.getElementById('c_pay').value,
                status: 'pendiente',
                createdAt: new Date()
            });
            app.state.cart = [];
            app.setStep('success');
        };
    </script>
</body>
</html>
