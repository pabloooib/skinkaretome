<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA — Skin Care Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a; --secondary: #8d7b6d; --accent: #fdfaf8;
            --white: #ffffff; --border: #eeeeee; --text: #2d2d2d;
            --text-muted: #757575; --transition: all 0.4s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--accent); color: var(--text); line-height: 1.6; }

        /* --- RESPONSIVE APP SHELL --- */
        #app { 
            max-width: 900px; margin: 0 auto; background: var(--white); 
            min-height: 100vh; display: none; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.02);
        }

        header { 
            padding: 1.5rem; text-align: center; position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); 
            z-index: 100; border-bottom: 1px solid var(--border);
        }

        .brand-text { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 0.3rem; text-transform: uppercase; }

        main { flex: 1; padding: 2rem; }

        /* --- CATALOGO RESPONSIVO --- */
        .catalog-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 2rem; margin-top: 1rem;
        }

        @media (max-width: 600px) {
            main { padding: 1rem; }
            .catalog-grid { grid-template-columns: 1fr; }
            .brand-text { font-size: 1.4rem; }
        }

        /* --- COMPONENTES --- */
        .product-card { 
            padding: 1.5rem; border: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: var(--transition);
        }
        .product-card:hover { border-color: var(--secondary); }
        .tag-recom { font-size: 0.6rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        
        .btn { 
            display: block; width: 100%; padding: 1rem; background: var(--primary); 
            color: white; border: none; text-transform: uppercase; 
            letter-spacing: 0.1rem; font-size: 0.7rem; cursor: pointer; 
        }

        .card-option { 
            padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1rem; 
            cursor: pointer; text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
        }

        .star-rating { font-size: 2rem; cursor: pointer; color: #ddd; transition: 0.2s; }
        .star-rating.active { color: var(--secondary); }

        .cart-status { 
            position: sticky; bottom: 0; background: var(--primary); color: white; 
            padding: 1.2rem; display: flex; justify-content: space-between; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fff;">
        <h1 style="font-family:'Cormorant Garamond'; letter-spacing:5px; margin-bottom:20px;">LUMINA</h1>
        <button class="btn" style="max-width:200px;" onclick="initApp()">Entrar</button>
    </div>

    <div id="app">
        <header><div class="brand-text">Lumina</div></header>
        <main id="stage"></main>
        <div id="cart-indicator" class="cart-status" style="display: none;" onclick="app.setStep('cart')">
            <span id="cart-count">0 ARTÍCULOS</span>
            <span id="cart-total">Q 0.00</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        window.app = {
            state: { step: 'intro', cart: [], dbProducts: [], skinType: null, rating: 0, orderDocId: null },

            init() {
                onSnapshot(collection(db, "productos"), (snap) => {
                    this.state.dbProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.render();
                });
            },

            setStep(s) { this.state.step = s; this.render(); window.scrollTo(0,0); },

            render() {
                const stage = document.getElementById('stage');
                const cartBar = document.getElementById('cart-indicator');
                const total = this.state.cart.reduce((s,p) => s+p.price, 0);

                cartBar.style.display = (this.state.cart.length > 0 && ['catalog','intro'].includes(this.state.step)) ? 'flex' : 'none';
                if(cartBar.style.display === 'flex') {
                    document.getElementById('cart-count').innerText = `${this.state.cart.length} ITEMS`;
                    document.getElementById('cart-total').innerText = `Q ${total.toFixed(2)}`;
                }

                if(this.state.step === 'intro') {
                    stage.innerHTML = `
                        <div style="text-align:center; padding:2rem 0;">
                            <h2 style="font-family:'Cormorant Garamond'; font-size:2rem; margin-bottom:1rem;">Bienvenido al Atelier</h2>
                            <p style="margin-bottom:2rem;">¿Desea una asesoría personalizada o prefiere explorar el catálogo?</p>
                            <button class="btn" onclick="app.setStep('diagnostic')">Asesoría de Piel</button>
                            <button class="btn" style="background:none; color:var(--primary); border:1px solid var(--border); margin-top:1rem;" onclick="app.setStep('catalog')">Ver Catálogo</button>
                        </div>`;
                }
                else if(this.state.step === 'diagnostic') {
                    stage.innerHTML = `
                        <h2>¿Cómo siente su piel hoy?</h2>
                        <div class="card-option" onclick="app.state.skinType='seca'; app.setStep('catalog')">Opaca o con tirantez</div>
                        <div class="card-option" onclick="app.state.skinType='grasa'; app.setStep('catalog')">Brillo excesivo o poros abiertos</div>
                        <div class="card-option" onclick="app.state.skinType='mixta'; app.setStep('catalog')">Grasa en zona T, normal en mejillas</div>
                    `;
                }
                else if(this.state.step === 'catalog') {
                    stage.innerHTML = `<button onclick="app.setStep('intro')" style="border:none; background:none; color:var(--secondary); cursor:pointer; margin-bottom:1rem;">← REGRESAR</button>
                                       <div class="catalog-grid"></div>`;
                    const grid = stage.querySelector('.catalog-grid');
                    this.state.dbProducts.forEach(p => {
                        const isRecom = this.state.skinType && p.description?.toLowerCase().includes(this.state.skinType);
                        grid.innerHTML += `
                            <div class="product-card">
                                ${isRecom ? '<span class="tag-recom">✦ RECOMENDADO</span>' : ''}
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                                    <span style="font-family:'Cormorant Garamond'; font-size:1.3rem;">${p.name}</span>
                                    <span>Q${p.price}</span>
                                </div>
                                <p style="font-size:0.8rem; color:gray; flex-grow:1; margin-bottom:1rem;">${p.description || ''}</p>
                                <button class="btn" onclick="addToCart('${p.id}')">Añadir</button>
                            </div>`;
                    });
                }
                else if(this.state.step === 'cart') {
                    stage.innerHTML = `<h2>Su Bolsa</h2>` + this.state.cart.map(p => `
                        <div style="display:flex; justify-content:space-between; padding:1rem 0; border-bottom:1px solid #eee;">
                            <span>${p.name}</span><strong>Q${p.price}</strong>
                        </div>`).join('') + `<button class="btn" style="margin-top:2rem;" onclick="app.setStep('checkout')">Pagar Q${total.toFixed(2)}</button>`;
                }
                else if(this.state.step === 'checkout') {
                    stage.innerHTML = `
                        <h2>Datos de Entrega</h2>
                        <input type="text" id="c_name" placeholder="Nombre completo">
                        <input type="text" id="c_addr" placeholder="Dirección">
                        <button class="btn" onclick="processOrder()">Confirmar Pedido</button>`;
                }
                else if(this.state.step === 'feedback') {
                    stage.innerHTML = `
                        <div style="text-align:center; padding:2rem 0;">
                            <h2>¡Gracias por su compra!</h2>
                            <p>¿Cómo calificaría nuestra atención?</p>
                            <div style="margin:1.5rem 0;">
                                ${[1,2,3,4,5].map(n => `<span class="star-rating" onclick="setStar(${n})">★</span>`).join('')}
                            </div>
                            <textarea id="f_msg" placeholder="¿Qué podemos mejorar?" rows="4" style="margin-top:1rem;"></textarea>
                            <button class="btn" onclick="sendFeedback()">Enviar Comentarios</button>
                        </div>`;
                }
            }
        };

        window.initApp = () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            setTimeout(() => document.getElementById('app').style.opacity = '1', 50);
            app.init();
        };

        window.addToCart = (id) => {
            const p = app.state.dbProducts.find(x => x.id === id);
            app.state.cart.push(p);
            app.render();
        };

        window.setStar = (n) => {
            app.state.rating = n;
            document.querySelectorAll('.star-rating').forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
        };

        window.processOrder = async () => {
            const name = document.getElementById('c_name').value;
            const addr = document.getElementById('c_addr').value;
            if(!name || !addr) return alert("Complete los datos");

            const res = await addDoc(collection(db, "pedidos"), {
                name, addr, items: app.state.cart, total: app.state.cart.reduce((s,p)=>s+p.price,0),
                status: 'pendiente', createdAt: new Date()
            });
            app.state.orderDocId = res.id;
            app.state.cart = [];
            app.setStep('feedback');
        };

        window.sendFeedback = async () => {
            const msg = document.getElementById('f_msg').value;
            // Aquí podrías actualizar el pedido en Firebase con el feedback si quisieras
            alert("¡Gracias por ayudarnos a mejorar!");
            location.reload();
        };
    </script>
</body>
</html>
